services:
  - type: web
    name: restaurant-django
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn restaurant.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: restaurant-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DEBUG
        value: false

databases:
  - name: restaurant-db
    plan: free
